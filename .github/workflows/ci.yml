name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  go-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify gofmt
        run: |
          targets=()
          [ -d cmd ] && targets+=("cmd")
          [ -d internal ] && targets+=("internal")
          if [ "${#targets[@]}" -eq 0 ]; then
            exit 0
          fi

          unformatted="$(gofmt -l "${targets[@]}")"
          if [ -n "${unformatted}" ]; then
            echo "Unformatted files:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Verify go.mod/go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Build binaries (linux/amd64, linux/arm64)
        run: |
          for arch in amd64 arm64; do
            echo "Building linux/${arch}"
            GOOS=linux GOARCH="${arch}" CGO_ENABLED=0 go build -o "/tmp/timertab-${arch}" ./cmd/timertab
          done

      - name: Run tests
        run: go test ./...

  race:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run race tests
        run: go test -race ./...

  release-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

  archlinux-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build Arch Linux package
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish

      - name: Upload Arch Linux package
        uses: actions/upload-artifact@v4
        with:
          name: timertab-archlinux-packages
          path: dist/*.pkg.tar.zst
          if-no-files-found: error

  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.4

      - name: Lint GitHub workflows
        run: |
          actionlint_bin="$(go env GOPATH)/bin/actionlint"
          "${actionlint_bin}"
