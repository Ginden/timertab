name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify gofmt
        run: |
          targets=()
          [ -d cmd ] && targets+=("cmd")
          [ -d internal ] && targets+=("internal")
          if [ "${#targets[@]}" -eq 0 ]; then
            exit 0
          fi

          unformatted="$(gofmt -l "${targets[@]}")"
          if [ -n "${unformatted}" ]; then
            echo "Unformatted files:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Verify go.mod/go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Build binaries (linux/amd64, linux/arm64)
        run: |
          for arch in amd64 arm64; do
            echo "Building linux/${arch}"
            GOOS=linux GOARCH="${arch}" CGO_ENABLED=0 go build -o "/tmp/timertab-${arch}" ./cmd/timertab
          done

      - name: Run tests
        run: go test ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build and publish release
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v3
        with:
          subject-checksums: ./dist/checksums.txt
