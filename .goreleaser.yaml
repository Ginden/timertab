version: 2

project_name: timertab

builds:
  - id: timertab
    binary: timertab
    main: ./cmd/timertab
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X github.com/ginden/timertab/internal/version.Version={{ .Version }}
        -X github.com/ginden/timertab/internal/version.Commit={{ .Commit }}
        -X github.com/ginden/timertab/internal/version.Date={{ .Date }}

archives:
  - id: default
    ids:
      - timertab
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md

nfpms:
  - id: packages
    ids:
      - timertab
    package_name: timertab
    file_name_template: "{{ .ConventionalFileName }}"
    homepage: https://github.com/ginden/timertab
    maintainer: Michal Wadas <michalwadas@gmail.com>
    description: Manage native systemd timers from a crontab-like YAML config.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/timertab/LICENSE
      - src: ./README.md
        dst: /usr/share/doc/timertab/README.md

checksum:
  name_template: checksums.txt

changelog:
  use: git

release:
  prerelease: auto
